<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Vato | Official Links</title>
    <link rel="canonical" href="https://elrealvato.github.io/elvato-website/" />
    <meta name="robots" content="index,follow" />
    <meta
      name="description"
      content="All official El Vato links in one place: Twitch, Instagram, TikTok, X, YouTube, Facebook, and Discord."
    />
    <meta name="author" content="El Vato" />
    <meta name="theme-color" content="#0b0b0b" />

    <meta property="og:site_name" content="El Vato" />
    <meta property="og:title" content="El Vato | Official Links" />
    <meta
      property="og:description"
      content="Tap in with El Vato across every platform."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://elrealvato.github.io/elvato-website/" />
    <meta property="og:image" content="elvato.png" />
    <meta property="og:image:alt" content="El Vato logo in monochrome with sombrero and poncho" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="El Vato | Official Links" />
    <meta name="twitter:description" content="Tap in with El Vato across every platform." />
    <meta name="twitter:image" content="elvato.png" />
    <meta name="twitter:image:alt" content="El Vato logo in monochrome with sombrero and poncho" />

    <link rel="icon" href="elvato.png" type="image/png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rye&family=Outfit:wght@300;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <main class="page-shell">
      <div class="greca greca-top" aria-hidden="true"></div>

      <section class="hero">
        <div class="hero-copy">
          <p class="kicker">Official Hub</p>
          <h1>EL VATO</h1>
          <p class="subtitle">Just a Vato sharing good vibes &amp; good times! 𐚁</p>

          <nav class="quick-icons" aria-label="Quick social links">
            <a href="https://www.twitch.tv/elrealvato" target="_blank" rel="noopener noreferrer" aria-label="Twitch">
              <i class="fa-brands fa-twitch" aria-hidden="true"></i>
            </a>
            <a href="https://www.instagram.com/elrealvato" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
              <i class="fa-brands fa-instagram" aria-hidden="true"></i>
            </a>
            <a href="https://www.tiktok.com/@elrealvato" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
              <i class="fa-brands fa-tiktok" aria-hidden="true"></i>
            </a>
            <a href="https://x.com/elrealvatoo" target="_blank" rel="noopener noreferrer" aria-label="X">
              <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
            </a>
            <a href="https://www.youtube.com/@elrealvatoo" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
              <i class="fa-brands fa-youtube" aria-hidden="true"></i>
            </a>
            <a href="https://www.facebook.com/elrealvato" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
              <i class="fa-brands fa-facebook" aria-hidden="true"></i>
            </a>
            <a href="https://discord.com/invite/89HMg9xGQu" target="_blank" rel="noopener noreferrer" aria-label="Vato Club Discord">
              <i class="fa-brands fa-discord" aria-hidden="true"></i>
            </a>
          </nav>
        </div>

        <div class="logo-wrap" aria-hidden="true">
          <div class="logo-glow"></div>
          <img src="elvato.png" alt="El Vato logo" class="hero-logo" />
        </div>
      </section>

      <section class="links" aria-label="El Vato links">
        <article class="link-card" data-platform="Twitch" data-url="https://www.twitch.tv/elrealvato" data-icon="fa-twitch">
          <a class="link-main" href="https://www.twitch.tv/elrealvato" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-twitch" aria-hidden="true"></i>
            <span>Twitch</span>
          </a>
          <button class="link-menu" type="button" aria-label="Share Twitch link" title="Share Twitch link">
            <i class="fa-solid fa-ellipsis" aria-hidden="true"></i>
          </button>
        </article>

        <article class="link-card" data-platform="Instagram" data-url="https://www.instagram.com/elrealvato" data-icon="fa-instagram">
          <a class="link-main" href="https://www.instagram.com/elrealvato" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-instagram" aria-hidden="true"></i>
            <span>Instagram</span>
          </a>
          <button class="link-menu" type="button" aria-label="Share Instagram link" title="Share Instagram link">
            <i class="fa-solid fa-ellipsis" aria-hidden="true"></i>
          </button>
        </article>

        <article class="link-card" data-platform="TikTok" data-url="https://www.tiktok.com/@elrealvato" data-icon="fa-tiktok">
          <a class="link-main" href="https://www.tiktok.com/@elrealvato" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-tiktok" aria-hidden="true"></i>
            <span>TikTok</span>
          </a>
          <button class="link-menu" type="button" aria-label="Share TikTok link" title="Share TikTok link">
            <i class="fa-solid fa-ellipsis" aria-hidden="true"></i>
          </button>
        </article>

        <article class="link-card" data-platform="X" data-url="https://x.com/elrealvatoo" data-icon="fa-x-twitter">
          <a class="link-main" href="https://x.com/elrealvatoo" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
            <span>X</span>
          </a>
          <button class="link-menu" type="button" aria-label="Share X link" title="Share X link">
            <i class="fa-solid fa-ellipsis" aria-hidden="true"></i>
          </button>
        </article>

        <article class="link-card" data-platform="YouTube" data-url="https://www.youtube.com/@elrealvatoo" data-icon="fa-youtube">
          <a class="link-main" href="https://www.youtube.com/@elrealvatoo" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-youtube" aria-hidden="true"></i>
            <span>YouTube</span>
          </a>
          <button class="link-menu" type="button" aria-label="Share YouTube link" title="Share YouTube link">
            <i class="fa-solid fa-ellipsis" aria-hidden="true"></i>
          </button>
        </article>

        <article class="link-card" data-platform="Facebook" data-url="https://www.facebook.com/elrealvato" data-icon="fa-facebook">
          <a class="link-main" href="https://www.facebook.com/elrealvato" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-facebook" aria-hidden="true"></i>
            <span>Facebook</span>
          </a>
          <button class="link-menu" type="button" aria-label="Share Facebook link" title="Share Facebook link">
            <i class="fa-solid fa-ellipsis" aria-hidden="true"></i>
          </button>
        </article>

        <article class="link-card featured" data-platform="Vato Club Discord" data-url="https://discord.com/invite/89HMg9xGQu" data-icon="fa-discord">
          <a class="link-main" href="https://discord.com/invite/89HMg9xGQu" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-discord" aria-hidden="true"></i>
            <span>Vato Club Discord</span>
          </a>
          <button class="link-menu" type="button" aria-label="Share Discord link" title="Share Discord link">
            <i class="fa-solid fa-ellipsis" aria-hidden="true"></i>
          </button>
        </article>
      </section>

      <footer>
        <p>El Vato</p>
      </footer>

      <div class="greca greca-bottom" aria-hidden="true"></div>
    </main>

    <div class="share-modal" id="share-modal" hidden>
      <div class="share-backdrop" data-close-modal="true"></div>
      <section class="share-panel" role="dialog" aria-modal="true" aria-labelledby="share-title">
        <button class="share-close" type="button" data-close-modal="true" aria-label="Close share dialog">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>
        <h2 id="share-title">Share link</h2>

        <div class="share-preview">
          <div class="share-preview-icon">
            <i id="share-preview-icon" class="fa-brands fa-twitch" aria-hidden="true"></i>
          </div>
          <h3 id="share-platform">Platform</h3>
          <p id="share-url">https://example.com</p>
        </div>

        <div class="share-actions">
          <button class="share-action" id="copy-link-btn" type="button">
            <i class="fa-solid fa-link" aria-hidden="true"></i>
            <span>Copy link</span>
          </button>
          <a class="share-action" id="share-x" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
            <span>X</span>
          </a>
          <a class="share-action" id="share-facebook" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-facebook" aria-hidden="true"></i>
            <span>Facebook</span>
          </a>
          <a class="share-action" id="share-whatsapp" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-whatsapp" aria-hidden="true"></i>
            <span>WhatsApp</span>
          </a>
          <a class="share-action" id="share-linkedin" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-linkedin" aria-hidden="true"></i>
            <span>LinkedIn</span>
          </a>
          <a class="share-action" id="share-messenger" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-facebook-messenger" aria-hidden="true"></i>
            <span>Messenger</span>
          </a>
          <a class="share-action" id="share-snapchat" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-snapchat" aria-hidden="true"></i>
            <span>Snapchat</span>
          </a>
          <a class="share-action" id="share-email" target="_blank" rel="noopener noreferrer">
            <i class="fa-solid fa-envelope" aria-hidden="true"></i>
            <span>Email</span>
          </a>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
